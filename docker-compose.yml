name: agendae

services:
  postgres:
    image: postgres:16-alpine
    container_name: agendae-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agendae
      POSTGRES_PASSWORD: agendae
      POSTGRES_DB: agendae
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendae -d agendae"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: agendae-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: